<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>Coach</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1 id="title">Coach</h1>
    <div class="header-actions">
      <button id="action" class="ghost" hidden></button>
      <a href="/logout" class="ghost" title="Sign out" aria-label="Sign out">⏻</a>
    </div>
  </header>

  <!-- Chat -->
  <section id="view-chat" class="view">
    <main id="messages" aria-live="polite"></main>
    <form id="composer">
      <textarea id="input" rows="1" placeholder="Ask your coach…" autocomplete="off"></textarea>
      <button id="send" type="submit" aria-label="Send">➤</button>
    </form>
  </section>

  <!-- Stats -->
  <section id="view-stats" class="view scroll stats-view" hidden>
    <div class="stats-container">
      <div class="stats-header">
        <div>
          <p class="stats-kicker">12 week view</p>
          <h2>Training snapshot</h2>
        </div>
        <div class="stats-actions">
          <div id="stats-meta" class="stats-meta" aria-live="polite">Loading stats...</div>
          <button id="sync-data" class="secondary" type="button">Fetch data</button>
        </div>
      </div>
      <div class="cards stats-summary" id="summary-cards"></div>
      <div class="stats-charts">
        <section class="chart-card chart-card-weight">
          <div class="chart-heading"><h3>Weight</h3><span>kg</span></div>
          <div class="chart-frame"><canvas id="chart-weight"></canvas></div>
        </section>
        <section class="chart-card">
          <div class="chart-heading"><h3>Body composition</h3><span>kg</span></div>
          <div class="chart-frame"><canvas id="chart-body"></canvas></div>
        </section>
        <section class="chart-card">
          <div class="chart-heading"><h3>Lifting tonnage</h3><span>weekly kg</span></div>
          <div class="chart-frame"><canvas id="chart-tonnage"></canvas></div>
        </section>
        <section class="chart-card">
          <div class="chart-heading"><h3>Cardio distance</h3><span>weekly km</span></div>
          <div class="chart-frame"><canvas id="chart-cardio"></canvas></div>
        </section>
      </div>
      <div id="stats-empty" class="empty stats-empty" hidden>No data yet. Run a sync to populate the dashboard.</div>
    </div>
  </section>

  <!-- Reviews -->
  <section id="view-reports" class="view scroll" hidden>
    <div class="segmented">
      <button data-kind="readiness" class="active">Daily readiness</button>
      <button data-kind="weekly">Weekly review</button>
    </div>
    <div class="reports-actions">
      <button id="generate" class="primary">Generate now</button>
      <button id="push-toggle" class="secondary" type="button" hidden>Enable notifications</button>
    </div>
    <div id="push-status" class="status-line" aria-live="polite"></div>
    <div id="reports-list"></div>
  </section>

  <nav id="tabbar">
    <button data-view="chat" class="active">Chat</button>
    <button data-view="stats">Stats</button>
    <button data-view="reports">Reviews</button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
