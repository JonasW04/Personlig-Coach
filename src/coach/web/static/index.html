<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" />
  <title>Coach</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="stats.css" />
</head>
<body>
  <header>
    <div class="brand">
      <img src="icon.svg" alt="" />
      <h1 id="title">Coach</h1>
    </div>
    <div class="header-actions">
      <a href="/logout" class="ghost" title="Sign out" aria-label="Sign out">⏻</a>
    </div>
  </header>

  <!-- Chat -->
  <section id="view-chat" class="view">
    <main id="messages" aria-live="polite"></main>
    <form id="composer">
      <textarea id="input" rows="1" placeholder="Ask your coach…" autocomplete="off"></textarea>
      <button id="send" type="submit" aria-label="Send">➤</button>
    </form>
  </section>

  <!-- Stats -->
  <section id="view-stats" class="view stats-view" hidden>
    <div class="stats-controls">
      <div class="stats-controls-inner">
        <div class="stats-titlerow">
          <div>
            <p class="stats-kicker">Training dashboard</p>
            <h2>Your progress</h2>
            <div class="stats-sub" id="stats-range-label">—</div>
          </div>
          <div class="stats-actions">
            <div id="stats-meta" class="stats-sub" aria-live="polite"></div>
            <button id="sync-data" class="secondary" type="button">Sync</button>
          </div>
        </div>
        <div class="range-row">
          <div class="range-chips" id="range-chips">
            <button class="chip" data-range="7d">7 days</button>
            <button class="chip" data-range="4w">4 weeks</button>
            <button class="chip active" data-range="3m">3 months</button>
            <button class="chip" data-range="6m">6 months</button>
            <button class="chip" data-range="ytd">YTD</button>
            <button class="chip" data-range="all">All time</button>
            <button class="chip" data-range="custom">Custom</button>
          </div>
          <div class="range-custom" id="range-custom" style="display:none">
            <input type="date" id="custom-start" aria-label="Start date" />
            <span>to</span>
            <input type="date" id="custom-end" aria-label="End date" />
          </div>
        </div>
      </div>
    </div>
    <div class="stats-scroll">
      <div class="stats-container" id="stats-content"></div>
    </div>
  </section>

  <!-- Reviews -->
  <section id="view-reports" class="view scroll" hidden>
    <!-- Focus -->
    <div class="focus-card">
      <div class="focus-head">
        <div>
          <p class="stats-kicker">Focus</p>
          <h2 id="focus-text">Loading…</h2>
        </div>
        <button id="focus-edit" class="secondary" type="button">Edit</button>
      </div>
      <form id="focus-form" class="focus-form" hidden>
        <textarea id="focus-input" rows="3" placeholder="e.g. Lose weight while maintaining strength" autocomplete="off"></textarea>
        <div class="focus-form-actions">
          <button id="focus-cancel" type="button" class="ghost">Cancel</button>
          <button class="primary" type="submit">Save &amp; update coaching</button>
        </div>
      </form>
      <div id="focus-status" class="status-line" aria-live="polite"></div>
    </div>

    <!-- Today's readiness verdict -->
    <button id="readiness-hero" class="verdict-card" type="button" hidden></button>

    <!-- This week's plan -->
    <div class="action-panel">
      <div class="action-head">
        <div>
          <p class="stats-kicker">Plan</p>
          <h2>This week</h2>
        </div>
        <button id="import-actions" class="secondary" type="button">Use latest review</button>
      </div>
      <div id="goal-progress" class="goal-progress"></div>
      <div id="actions-list" class="actions-list"></div>
      <form id="action-form" class="action-form">
        <input id="action-title" type="text" placeholder="Add a coaching action…" autocomplete="off" />
        <input id="action-due" type="date" aria-label="Due date" />
        <button class="primary" type="submit">Add</button>
      </form>
      <div id="action-status" class="status-line" aria-live="polite"></div>
    </div>

    <!-- Report archive -->
    <div class="reports-block">
      <div class="segmented">
        <button data-kind="readiness" class="active">Daily readiness</button>
        <button data-kind="weekly">Weekly review</button>
      </div>
      <div class="reports-actions">
        <button id="generate" class="primary">Generate now</button>
        <button id="push-toggle" class="secondary" type="button" hidden>Enable notifications</button>
      </div>
      <div id="push-status" class="status-line" aria-live="polite"></div>
      <div id="reports-list"></div>
    </div>
  </section>

  <nav id="tabbar">
    <button data-view="chat">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 9 9 0 0 1-4-1L3 20l1-4.5a8.5 8.5 0 1 1 17-4z"></path></svg>
      Chat
    </button>
    <button data-view="stats">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="13"></line><line x1="12" y1="20" x2="12" y2="7"></line><line x1="18" y1="20" x2="18" y2="10"></line></svg>
      Stats
    </button>
    <button data-view="reports">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="13" y2="17"></line></svg>
      Reviews
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="data.js"></script>
  <script src="charts.js"></script>
  <script src="calendar.js"></script>
  <script src="stats.js"></script>
  <script src="app.js"></script>
</body>
</html>
